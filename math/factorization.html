<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Разложение квадратного трёхчлена | Алгебра</title>
<link rel="icon" href="../favicon.ico">
<link rel="stylesheet" href="../assets/css/main.css">
<script>(function(){try{var t=localStorage.getItem("sci.theme");if(!t&&window.matchMedia)t=window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light";document.documentElement.dataset.theme=t||"light";}catch(e){}})();/*sci-theme-init*/</script>
</head>
<body>
<main>
  <div class="container-narrow calc-page">
    <h1>Разложение квадратного трёхчлена</h1>
    <p class="subtitle">ax² + bx + c = a·(x − x₁)·(x − x₂)</p>

    <div class="form">
      <div class="form-row cols-3">
        <div class="field"><label for="a">a</label><input type="text" id="a" inputmode="decimal"></div>
        <div class="field"><label for="b">b</label><input type="text" id="b" inputmode="decimal"></div>
        <div class="field"><label for="c">c</label><input type="text" id="c" inputmode="decimal"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="solve">Разложить</button>
        <button class="btn btn-ghost" id="reset">Очистить</button>
      </div>
    </div>

    <div class="result-panel">
      <h3>Ответ</h3>
      <div id="result"><div class="result-empty">Введите коэффициенты a, b, c</div></div>
    </div>
  </div>
</main>

<script src="../assets/js/core.js"></script>
<script src="../assets/js/solvers-math.js"></script>
<script>
  Sci.initShell({ active: 'math', depth: 1 });
  Sci.attachLiveValidation(['a', 'b', 'c']);

  document.getElementById('solve').addEventListener('click', () => {
    const a = Sci.num('a'), b = Sci.num('b'), c = Sci.num('c');
    const res = SciMath.factor(a, b, c);
    Sci.renderResult('result', res);
    if (!res.error) {
      Sci.History.add({
        section: 'Разл. на множ.',
        input: `${a}x² + ${b}x + ${c}`,
        answer: res.answers.join(''),
      });
    }
  });

  document.getElementById('reset').addEventListener('click', () => {
    ['a','b','c'].forEach(id => {
      const el = document.getElementById(id);
      el.value = '';
      el.classList.remove('invalid', 'valid');
    });
    Sci.renderResult('result', {});
  });
</script>
</body>
</html>
