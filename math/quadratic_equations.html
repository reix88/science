<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Квадратное уравнение | Алгебра</title>
<link rel="icon" href="../favicon.ico">
<link rel="stylesheet" href="../assets/css/main.css">
<script>(function(){try{var t=localStorage.getItem("sci.theme");if(!t&&window.matchMedia)t=window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light";document.documentElement.dataset.theme=t||"light";}catch(e){}})();/*sci-theme-init*/</script>
</head>
<body>
<main>
  <div class="container-narrow calc-page">
    <h1>Квадратное уравнение</h1>
    <p class="subtitle">Решение уравнения вида ax² + bx + c = 0</p>

    <div class="formula-hint">
      <b>a</b>·x² + <b>b</b>·x + <b>c</b> = 0 &nbsp;→&nbsp; D = b² − 4ac,&nbsp; x = (−b ± √D) / 2a
    </div>

    <div class="form">
      <div class="form-row cols-3">
        <div class="field">
          <label for="a">a</label>
          <input type="text" id="a" inputmode="decimal" placeholder="например, 1">
        </div>
        <div class="field">
          <label for="b">b</label>
          <input type="text" id="b" inputmode="decimal" placeholder="например, -5">
        </div>
        <div class="field">
          <label for="c">c</label>
          <input type="text" id="c" inputmode="decimal" placeholder="например, 6">
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="solve">Решить</button>
        <button class="btn btn-ghost" id="reset">Очистить</button>
      </div>
    </div>

    <div class="result-panel">
      <h3>Ответ</h3>
      <div id="result"><div class="result-empty">Введите коэффициенты и нажмите «Решить»</div></div>
    </div>
  </div>
</main>

<script src="../assets/js/core.js"></script>
<script src="../assets/js/solvers-math.js"></script>
<script>
  Sci.initShell({ active: 'math', depth: 1 });
  Sci.attachLiveValidation(['a', 'b', 'c']);

  document.getElementById('solve').addEventListener('click', () => {
    const a = Sci.num('a'), b = Sci.num('b'), c = Sci.num('c');
    const res = SciMath.quadratic(a, b, c);
    Sci.renderResult('result', res);
    if (!res.error && res.answers) {
      Sci.History.add({
        section: 'Кв. ур.',
        input: `${a}x² + ${b}x + ${c} = 0`,
        answer: res.answers.map(x => `${x.label}=${x.value}`).join(', '),
      });
    }
  });

  document.getElementById('reset').addEventListener('click', () => {
    ['a', 'b', 'c'].forEach(id => {
      const el = document.getElementById(id);
      el.value = '';
      el.classList.remove('invalid', 'valid');
    });
    Sci.renderResult('result', {});
  });
</script>
</body>
</html>
