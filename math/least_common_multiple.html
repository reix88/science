<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Наименьшее общее кратное | Алгебра</title>
<link rel="icon" href="../favicon.ico">
<link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
<main>
  <div class="container-narrow calc-page">
    <h1>Наименьшее общее кратное (НОК)</h1>
    <p class="subtitle">НОК(a, b) = |a · b| / НОД(a, b)</p>

    <div class="form">
      <div class="form-row cols-2">
        <div class="field"><label for="a">a</label><input type="text" id="a" inputmode="numeric"></div>
        <div class="field"><label for="b">b</label><input type="text" id="b" inputmode="numeric"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="solve">Найти</button>
        <button class="btn btn-ghost" id="reset">Очистить</button>
      </div>
    </div>

    <div class="result-panel">
      <h3>Ответ</h3>
      <div id="result"><div class="result-empty">Введите два целых числа</div></div>
    </div>
  </div>
</main>

<script src="../assets/js/core.js"></script>
<script src="../assets/js/solvers-math.js"></script>
<script>
  Sci.initShell({ active: 'math', depth: 1 });
  Sci.attachLiveValidation(['a', 'b']);

  document.getElementById('solve').addEventListener('click', () => {
    const a = Sci.int('a'), b = Sci.int('b');
    const res = SciMath.lcm(a, b);
    Sci.renderResult('result', res);
    if (!res.error) {
      Sci.History.add({
        section: 'НОК',
        input: `${a}, ${b}`,
        answer: res.answers.map(x => `${x.label}=${x.value}`).join(', '),
      });
    }
  });

  document.getElementById('reset').addEventListener('click', () => {
    ['a','b'].forEach(id => {
      const el = document.getElementById(id);
      el.value = '';
      el.classList.remove('invalid', 'valid');
    });
    Sci.renderResult('result', {});
  });
</script>
</body>
</html>
