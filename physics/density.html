<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Плотность | Физика</title>
<link rel="icon" href="../favicon.ico">
<link rel="stylesheet" href="../assets/css/main.css">
<script>(function(){try{var t=localStorage.getItem("sci.theme");if(!t&&window.matchMedia)t=window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light";document.documentElement.dataset.theme=t||"light";}catch(e){}})();/*sci-theme-init*/</script>
</head>
<body>
<main>
  <div class="container-narrow calc-page">
    <h1>Плотность</h1>
    <p class="subtitle">Заполните два поля из трёх</p>
    <div class="formula-hint">ρ = m / V,&nbsp; m = ρ · V,&nbsp; V = m / ρ</div>

    <div class="form">
      <div class="form-row cols-3">
        <div class="field"><label for="rho">ρ (кг/м³)</label><input type="text" id="rho" inputmode="decimal"></div>
        <div class="field"><label for="m">m (кг)</label><input type="text" id="m" inputmode="decimal"></div>
        <div class="field"><label for="V">V (м³)</label><input type="text" id="V" inputmode="decimal"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="solve">Вычислить</button>
        <button class="btn btn-ghost" id="reset">Очистить</button>
      </div>
    </div>

    <div class="result-panel">
      <h3>Ответ</h3>
      <div id="result"><div class="result-empty">Заполните два поля из трёх</div></div>
    </div>
  </div>
</main>

<script src="../assets/js/core.js"></script>
<script src="../assets/js/solvers-physics.js"></script>
<script>
  Sci.initShell({ active: 'physics', depth: 1 });
  Sci.attachLiveValidation(['rho','m','V']);
  document.getElementById('solve').addEventListener('click', () => {
    const rho = Sci.num('rho'), m = Sci.num('m'), V = Sci.num('V');
    const res = SciPhys.density({ rho, m, V });
    Sci.renderResult('result', res);
    if (!res.error) Sci.History.add({ section: 'Плотность', input: `ρ=${rho||'?'}, m=${m||'?'}, V=${V||'?'}`, answer: res.answers.map(x => `${x.label}=${x.value}`).join('; ') });
  });
  document.getElementById('reset').addEventListener('click', () => {
    ['rho','m','V'].forEach(id => { const el = document.getElementById(id); el.value=''; el.classList.remove('valid','invalid'); });
    Sci.renderResult('result', {});
  });
</script>
</body>
</html>
