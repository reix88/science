<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Второй закон Ньютона | Физика</title>
<link rel="icon" href="../favicon.ico">
<link rel="stylesheet" href="../assets/css/main.css">
<script>(function(){try{var t=localStorage.getItem("sci.theme");if(!t&&window.matchMedia)t=window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light";document.documentElement.dataset.theme=t||"light";}catch(e){}})();/*sci-theme-init*/</script>
</head>
<body>
<main>
  <div class="container-narrow calc-page">
    <h1>Второй закон Ньютона</h1>
    <p class="subtitle">Заполните два поля из трёх — третье найдётся</p>
    <div class="formula-hint">F = m · a</div>

    <div class="form">
      <div class="form-row cols-3">
        <div class="field"><label for="F">F (Н)</label><input type="text" id="F" inputmode="decimal"></div>
        <div class="field"><label for="m">m (кг)</label><input type="text" id="m" inputmode="decimal"></div>
        <div class="field"><label for="a">a (м/с²)</label><input type="text" id="a" inputmode="decimal"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="solve">Вычислить</button>
        <button class="btn btn-ghost" id="reset">Очистить</button>
      </div>
    </div>

    <div class="result-panel">
      <h3>Ответ</h3>
      <div id="result"><div class="result-empty">Заполните два поля из трёх</div></div>
    </div>
  </div>
</main>

<script src="../assets/js/core.js"></script>
<script src="../assets/js/solvers-physics.js"></script>
<script>
  Sci.initShell({ active: 'physics', depth: 1 });
  Sci.attachLiveValidation(['F','m','a']);
  document.getElementById('solve').addEventListener('click', () => {
    const F = Sci.num('F'), m = Sci.num('m'), a = Sci.num('a');
    const res = SciPhys.newton({ F, m, a });
    Sci.renderResult('result', res);
    if (!res.error) Sci.History.add({ section: 'Ньютон', input: `F=${F||'?'}, m=${m||'?'}, a=${a||'?'}`, answer: res.answers.map(x => `${x.label}=${x.value}`).join('; ') });
  });
  document.getElementById('reset').addEventListener('click', () => {
    ['F','m','a'].forEach(id => { const el = document.getElementById(id); el.value=''; el.classList.remove('valid','invalid'); });
    Sci.renderResult('result', {});
  });
</script>
</body>
</html>
