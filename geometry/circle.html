<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Круг и окружность | Геометрия</title>
<link rel="icon" href="../favicon.ico">
<link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
<main>
  <div class="container-narrow calc-page">
    <h1>Круг и окружность</h1>
    <p class="subtitle">Площадь, длина окружности и диаметр по радиусу</p>
    <div class="formula-hint">S = π·r²,&nbsp; C = 2π·r,&nbsp; d = 2r</div>

    <div class="form">
      <div class="form-row">
        <div class="field"><label for="r">Радиус r</label><input type="text" id="r" inputmode="decimal"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="solve">Вычислить</button>
        <button class="btn btn-ghost" id="reset">Очистить</button>
      </div>
    </div>

    <div class="result-panel">
      <h3>Ответ</h3>
      <div id="result"><div class="result-empty">Введите радиус</div></div>
    </div>
  </div>
</main>

<script src="../assets/js/core.js"></script>
<script src="../assets/js/solvers-geometry.js"></script>
<script>
  Sci.initShell({ active: 'geometry', depth: 1 });
  Sci.attachLiveValidation(['r']);
  document.getElementById('solve').addEventListener('click', () => {
    const r = Sci.num('r');
    const res = SciGeo.circle(r);
    Sci.renderResult('result', res);
    if (!res.error) Sci.History.add({ section: 'Круг', input: `r=${r}`, answer: res.answers.map(x => `${x.label}=${x.value}`).join('; ') });
  });
  document.getElementById('reset').addEventListener('click', () => {
    const el = document.getElementById('r'); el.value=''; el.classList.remove('valid','invalid');
    Sci.renderResult('result', {});
  });
</script>
</body>
</html>
