<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Параллелограмм | Геометрия</title>
<link rel="icon" href="../favicon.ico">
<link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
<main>
  <div class="container-narrow calc-page">
    <h1>Параллелограмм</h1>
    <p class="subtitle">Площадь по стороне и высоте</p>
    <div class="formula-hint">S = a · h</div>

    <div class="form">
      <div class="form-row cols-2">
        <div class="field"><label for="a">Сторона a</label><input type="text" id="a" inputmode="decimal"></div>
        <div class="field"><label for="h">Высота h</label><input type="text" id="h" inputmode="decimal"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="solve">Вычислить</button>
        <button class="btn btn-ghost" id="reset">Очистить</button>
      </div>
    </div>

    <div class="result-panel">
      <h3>Ответ</h3>
      <div id="result"><div class="result-empty">Введите a и h</div></div>
    </div>
  </div>
</main>

<script src="../assets/js/core.js"></script>
<script src="../assets/js/solvers-geometry.js"></script>
<script>
  Sci.initShell({ active: 'geometry', depth: 1 });
  Sci.attachLiveValidation(['a','h']);
  document.getElementById('solve').addEventListener('click', () => {
    const a = Sci.num('a'), h = Sci.num('h');
    const res = SciGeo.parallelogram(a, h);
    Sci.renderResult('result', res);
    if (!res.error) Sci.History.add({ section: 'Параллелограмм', input: `a=${a}, h=${h}`, answer: res.answers.map(x => `${x.label}=${x.value}`).join('; ') });
  });
  document.getElementById('reset').addEventListener('click', () => {
    ['a','h'].forEach(id => { const el = document.getElementById(id); el.value=''; el.classList.remove('valid','invalid'); });
    Sci.renderResult('result', {});
  });
</script>
</body>
</html>
