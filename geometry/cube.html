<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Куб | Геометрия</title>
<link rel="icon" href="../favicon.ico">
<link rel="stylesheet" href="../assets/css/main.css">
<script>(function(){try{var t=localStorage.getItem("sci.theme");if(!t&&window.matchMedia)t=window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light";document.documentElement.dataset.theme=t||"light";}catch(e){}})();/*sci-theme-init*/</script>
</head>
<body>
<main>
  <div class="container-narrow calc-page">
    <h1>Куб</h1>
    <p class="subtitle">Объём, площадь поверхности и диагональ</p>
    <div class="formula-hint">V = a³,&nbsp; S = 6a²,&nbsp; d = a√3</div>

    <div class="form">
      <div class="form-row">
        <div class="field"><label for="a">Ребро a</label><input type="text" id="a" inputmode="decimal"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="solve">Вычислить</button>
        <button class="btn btn-ghost" id="reset">Очистить</button>
      </div>
    </div>

    <div class="result-panel">
      <h3>Ответ</h3>
      <div id="result"><div class="result-empty">Введите длину ребра</div></div>
    </div>
  </div>
</main>

<script src="../assets/js/core.js"></script>
<script src="../assets/js/solvers-geometry.js"></script>
<script>
  Sci.initShell({ active: 'geometry', depth: 1 });
  Sci.attachLiveValidation(['a']);
  document.getElementById('solve').addEventListener('click', () => {
    const a = Sci.num('a');
    const res = SciGeo.cube(a);
    Sci.renderResult('result', res);
    if (!res.error) Sci.History.add({ section: 'Куб', input: `a=${a}`, answer: res.answers.map(x => `${x.label}=${x.value}`).join('; ') });
  });
  document.getElementById('reset').addEventListener('click', () => {
    const el = document.getElementById('a'); el.value=''; el.classList.remove('valid','invalid');
    Sci.renderResult('result', {});
  });
</script>
</body>
</html>
