<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Треугольник | Геометрия</title>
<link rel="icon" href="../favicon.ico">
<link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
<main>
  <div class="container-narrow calc-page">
    <h1>Треугольник по трём сторонам</h1>
    <p class="subtitle">Площадь по формуле Герона</p>
    <div class="formula-hint">p = (a + b + c)/2,&nbsp; S = √(p(p−a)(p−b)(p−c))</div>

    <div class="form">
      <div class="form-row cols-3">
        <div class="field"><label for="a">a</label><input type="text" id="a" inputmode="decimal"></div>
        <div class="field"><label for="b">b</label><input type="text" id="b" inputmode="decimal"></div>
        <div class="field"><label for="c">c</label><input type="text" id="c" inputmode="decimal"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="solve">Вычислить</button>
        <button class="btn btn-ghost" id="reset">Очистить</button>
      </div>
    </div>

    <div class="result-panel">
      <h3>Ответ</h3>
      <div id="result"><div class="result-empty">Введите три стороны</div></div>
    </div>
  </div>
</main>

<script src="../assets/js/core.js"></script>
<script src="../assets/js/solvers-geometry.js"></script>
<script>
  Sci.initShell({ active: 'geometry', depth: 1 });
  Sci.attachLiveValidation(['a','b','c']);
  document.getElementById('solve').addEventListener('click', () => {
    const a = Sci.num('a'), b = Sci.num('b'), c = Sci.num('c');
    const res = SciGeo.triangle(a, b, c);
    Sci.renderResult('result', res);
    if (!res.error) Sci.History.add({ section: 'Треугольник', input: `a=${a}, b=${b}, c=${c}`, answer: res.answers.map(x => `${x.label}=${x.value}`).join('; ') });
  });
  document.getElementById('reset').addEventListener('click', () => {
    ['a','b','c'].forEach(id => { const el = document.getElementById(id); el.value=''; el.classList.remove('valid','invalid'); });
    Sci.renderResult('result', {});
  });
</script>
</body>
</html>
