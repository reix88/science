<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Прямоугольник | Геометрия</title>
<link rel="icon" href="../favicon.ico">
<link rel="stylesheet" href="../assets/css/main.css">
<script>(function(){try{var t=localStorage.getItem("sci.theme");if(!t&&window.matchMedia)t=window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light";document.documentElement.dataset.theme=t||"light";}catch(e){}})();/*sci-theme-init*/</script>
</head>
<body>
<main>
  <div class="container-narrow calc-page">
    <h1>Прямоугольник</h1>
    <p class="subtitle">Площадь, периметр и диагональ по сторонам</p>
    <div class="formula-hint">S = a·b,&nbsp; P = 2(a+b),&nbsp; d = √(a² + b²)</div>

    <div class="form">
      <div class="form-row cols-2">
        <div class="field"><label for="a">Сторона a</label><input type="text" id="a" inputmode="decimal"></div>
        <div class="field"><label for="b">Сторона b</label><input type="text" id="b" inputmode="decimal"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="solve">Вычислить</button>
        <button class="btn btn-ghost" id="reset">Очистить</button>
      </div>
    </div>

    <div class="result-panel">
      <h3>Ответ</h3>
      <div id="result"><div class="result-empty">Введите стороны</div></div>
    </div>
  </div>
</main>

<script src="../assets/js/core.js"></script>
<script src="../assets/js/solvers-geometry.js"></script>
<script>
  Sci.initShell({ active: 'geometry', depth: 1 });
  Sci.attachLiveValidation(['a', 'b']);
  document.getElementById('solve').addEventListener('click', () => {
    const a = Sci.num('a'), b = Sci.num('b');
    const res = SciGeo.rectangle(a, b);
    Sci.renderResult('result', res);
    if (!res.error) Sci.History.add({ section: 'Прямоугольник', input: `a=${a}, b=${b}`, answer: res.answers.map(x => `${x.label}=${x.value}`).join('; ') });
  });
  document.getElementById('reset').addEventListener('click', () => {
    ['a','b'].forEach(id => { const el = document.getElementById(id); el.value=''; el.classList.remove('valid','invalid'); });
    Sci.renderResult('result', {});
  });
</script>
</body>
</html>
